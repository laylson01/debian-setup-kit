name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: bash -n setup.sh lib/*.sh tests/*.sh

      - name: Behavior tests
        run: |
          for test_file in tests/*.sh; do
            bash "$test_file"
          done

      - name: Shellcheck
        run: shellcheck setup.sh lib/*.sh tests/*.sh
